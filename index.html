<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disc Golf Bag Builder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #141414; color: #e8e4df;
    font-family: 'Source Sans 3', system-ui, sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  #root { max-width: 540px; margin: 0 auto; padding: 16px 12px 100px; }
  input:focus { outline: 2px solid #3b8beb; outline-offset: -1px; }
  button { cursor: pointer; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Colors ─── */
const C = {
  bg:"#141414", card:"#1e1e1e", text:"#e8e4df", muted:"#8a8580",
  os:"#e05a33", stable:"#3b8beb", us:"#4ec46a", neutral:"#c9a84c", border:"#2a2a2a",
};

const catColors = {
  "Putters & Approach":"#8b6fb0", "Midranges":"#4a9e8f",
  "Fairway Drivers":"#c49a3c", "Distance Drivers":"#cf4f4f",
};
const catOrder = ["Putters & Approach","Midranges","Fairway Drivers","Distance Drivers"];

/* ─── Helpers ─── */
function stabColor(stab, turn, fade) {
  if (stab) {
    const s = stab.toLowerCase();
    if (s.includes("understable")) return C.us;
    if (s.includes("overstable")) return C.os;
  }
  const t = parseFloat(turn)||0, f = parseFloat(fade)||0;
  if (t <= -2) return C.us;
  if (t < 0 && f <= 1) return C.us;
  if (t === 0 && f <= 1) return C.neutral;
  if (f >= 3) return C.os;
  return C.stable;
}

function stabLabel(stab) {
  if (!stab) return "Stable";
  return stab.split(/[\s-]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ");
}

function getCat(speed) {
  const s = parseFloat(speed)||0;
  if (s <= 3) return "Putters & Approach";
  if (s <= 6) return "Midranges";
  if (s <= 9) return "Fairway Drivers";
  return "Distance Drivers";
}

/* ─── SVG Flight Path ─── */
function FlightPath({ turn, fade, color }) {
  const t = parseFloat(turn)||0, f = parseFloat(fade)||0;
  const sy = 26 - t*4;
  const pk = Math.max(4, Math.min(36, sy + t*5));
  const ey = Math.max(4, Math.min(36, pk - f*5));
  return (
    <svg viewBox="0 0 200 40" style={{width:"100%",height:36,display:"block"}}>
      <line x1="10" y1="38" x2="10" y2="3" stroke="#333" strokeWidth=".4" strokeDasharray="2"/>
      <text x="3" y="7" fill="#555" fontSize="5">L</text>
      <text x="3" y="39" fill="#555" fontSize="5">R</text>
      <path
        d={`M16,${sy} C55,${sy+(pk-sy)*.7} 125,${pk+(ey-pk)*.3} 176,${ey}`}
        stroke={color} strokeWidth="2" strokeLinecap="round" fill="none"
      />
      <circle cx="176" cy={ey} r="2" fill={color}/>
    </svg>
  );
}

/* ─── Disc Card ─── */
function DiscCard({ disc, onAdd, onRemove, inBag }) {
  const col = stabColor(disc.stability, disc.turn, disc.fade);
  const label = stabLabel(disc.stability);

  return (
    <div style={{background:C.card, borderRadius:10, padding:12, borderLeft:`4px solid ${col}`, marginBottom:8}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:5}}>
        <div style={{flex:1, minWidth:0, marginRight:8}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.15rem", letterSpacing:2, lineHeight:1}}>
            {disc.name}
          </div>
          <div style={{fontSize:"0.58rem", color:C.muted, textTransform:"uppercase", letterSpacing:1.5, marginTop:2}}>
            {disc.brand}
          </div>
        </div>
        <div style={{display:"flex", gap:5, alignItems:"center", flexShrink:0}}>
          <span style={{
            fontSize:"0.46rem", fontWeight:700, padding:"2px 5px", borderRadius:3,
            background:`${col}22`, color:col, border:`1px solid ${col}44`,
            textTransform:"uppercase", letterSpacing:.8, whiteSpace:"nowrap",
          }}>
            {label}
          </span>
          <button
            onClick={() => inBag ? onRemove(disc) : onAdd(disc)}
            style={{
              background: inBag ? "#c0392b" : C.stable, color:"#fff", border:"none",
              borderRadius:5, padding:"4px 9px", fontSize:"0.58rem", fontWeight:700,
            }}
          >
            {inBag ? "✕" : "+ Add"}
          </button>
        </div>
      </div>

      <div style={{display:"flex", marginBottom:5}}>
        {[{l:"SPD",v:disc.speed},{l:"GLD",v:disc.glide},{l:"TRN",v:disc.turn},{l:"FDE",v:disc.fade}].map((n,i) => (
          <div key={i} style={{
            flex:1, textAlign:"center", padding:"3px 0",
            background:"rgba(255,255,255,0.03)", border:`1px solid ${C.border}`,
            borderRadius: i===0 ? "5px 0 0 5px" : i===3 ? "0 5px 5px 0" : 0,
          }}>
            <span style={{fontSize:"0.38rem", textTransform:"uppercase", letterSpacing:1, color:C.muted, display:"block"}}>{n.l}</span>
            <span style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:"1rem", display:"block"}}>{n.v}</span>
          </div>
        ))}
      </div>

      <div style={{background:"rgba(255,255,255,0.02)", borderRadius:5, padding:"2px 6px", border:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{fontSize:"0.38rem", textTransform:"uppercase", letterSpacing:1.5, color:C.muted}}>RHBH Flight</div>
        <FlightPath turn={disc.turn} fade={disc.fade} color={col}/>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [allDiscs, setAllDiscs] = useState([]);
  const [dbStatus, setDbStatus] = useState("loading");
  const [dbError, setDbError] = useState("");
  const [bag, setBag] = useState(() => {
    try { return JSON.parse(localStorage.getItem("dg-bag-v1")) || []; } catch { return []; }
  });
  const [search, setSearch] = useState("");
  const [view, setView] = useState("bag");
  const inputRef = useRef(null);

  // Save bag
  useEffect(() => {
    try { localStorage.setItem("dg-bag-v1", JSON.stringify(bag)); } catch {}
  }, [bag]);

  // Load disc database
  useEffect(() => {
    fetch("data/discs.json")
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(data => {
        if (!Array.isArray(data)) throw new Error("Bad format");
        setAllDiscs(data);
        setDbStatus("ready");
      })
      .catch(e => {
        setDbError(e.message);
        setDbStatus("error");
      });
  }, []);

  // Client-side search
  const results = useMemo(() => {
    if (!search.trim() || search.trim().length < 2) return [];
    const q = search.toLowerCase().trim();
    return allDiscs
      .filter(d => (d.name||"").toLowerCase().includes(q) || (d.brand||"").toLowerCase().includes(q))
      .slice(0, 30);
  }, [search, allDiscs]);

  const addToBag = useCallback(disc => {
    setBag(prev => prev.find(d => d.id === disc.id) ? prev : [...prev, disc]);
  }, []);

  const removeFromBag = useCallback(disc => {
    setBag(prev => prev.filter(d => d.id !== disc.id));
  }, []);

  const clearBag = () => {
    setBag([]);
    try { localStorage.removeItem("dg-bag-v1"); } catch {}
  };

  const bagIds = new Set(bag.map(d => d.id));
  const grouped = {};
  bag.forEach(d => {
    const cat = getCat(d.speed);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(d);
  });

  const quickSearches = ["Firebird","Buzzz","Wraith","Zone","Harp","Destroyer","Thunderbird","Roc3","Valkyrie","Teebird"];

  return (
    <div>
      {/* Header */}
      <div style={{textAlign:"center", marginBottom:16}}>
        <h1 style={{
          fontFamily:"'Bebas Neue',sans-serif", fontSize:"2.2rem", letterSpacing:4,
          background:"linear-gradient(135deg,#e05a33,#3b8beb)",
          WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", margin:0,
        }}>
          Disc Golf Bag Builder
        </h1>
        <p style={{color:C.muted, fontSize:"0.72rem", marginTop:2}}>
          {dbStatus === "ready"
            ? `${allDiscs.length.toLocaleString()} discs loaded from DiscIt · Build your bag`
            : dbStatus === "loading"
              ? "Loading disc database..."
              : "Database error"}
        </p>
      </div>

      {/* Error banner */}
      {dbStatus === "error" && (
        <div style={{
          background:"#2a1414", border:"1px solid #c0392b", borderRadius:8,
          padding:12, marginBottom:12, fontSize:"0.75rem", color:"#ffaaaa",
        }}>
          <strong>Could not load data/discs.json:</strong> {dbError}
          <div style={{fontSize:"0.65rem", color:"#aa8888", marginTop:6}}>
            Make sure data/discs.json exists. Run <code>./scripts/fetch-discs.sh</code> to create it. If running locally, use a local server (not file://).
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex", gap:4, marginBottom:12}}>
        <button
          onClick={() => setView("bag")}
          style={{
            flex:1, padding:"8px 0", border:"none", borderRadius:7,
            fontFamily:"'Bebas Neue',sans-serif", fontSize:"0.9rem", letterSpacing:2,
            background: view==="bag" ? C.stable : C.card,
            color: view==="bag" ? "#fff" : C.muted,
          }}
        >
          My Bag ({bag.length})
        </button>
        <button
          onClick={() => { setView("search"); setTimeout(() => inputRef.current?.focus(), 100); }}
          style={{
            flex:1, padding:"8px 0", border:"none", borderRadius:7,
            fontFamily:"'Bebas Neue',sans-serif", fontSize:"0.9rem", letterSpacing:2,
            background: view==="search" ? C.stable : C.card,
            color: view==="search" ? "#fff" : C.muted,
          }}
        >
          Search Discs
        </button>
      </div>

      {/* Search view */}
      {view === "search" && (
        <div>
          <input
            ref={inputRef}
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder={dbStatus === "ready" ? "Type a disc name or brand..." : "Loading..."}
            disabled={dbStatus !== "ready"}
            style={{
              width:"100%", padding:"10px 12px", borderRadius:7,
              border:`1px solid ${C.border}`, background:C.card,
              color:C.text, fontSize:"0.82rem",
              fontFamily:"'Source Sans 3',sans-serif",
              marginBottom:10, opacity: dbStatus==="ready" ? 1 : 0.5,
            }}
          />

          {dbStatus === "loading" && (
            <div style={{textAlign:"center", padding:20}}>
              <div style={{display:"inline-block", width:18, height:18, border:`2px solid ${C.border}`, borderTopColor:C.stable, borderRadius:"50%", animation:"spin .8s linear infinite"}} />
              <p style={{color:C.muted, fontSize:"0.72rem", marginTop:8}}>Loading disc database...</p>
            </div>
          )}

          {dbStatus === "ready" && search.trim().length < 2 && (
            <div style={{textAlign:"center", padding:"20px 16px"}}>
              <p style={{color:C.muted, fontSize:"0.72rem", lineHeight:1.6, marginBottom:10}}>
                Search {allDiscs.length.toLocaleString()} discs by name or brand:
              </p>
              <div style={{display:"flex", flexWrap:"wrap", gap:5, justifyContent:"center"}}>
                {quickSearches.map(s => (
                  <button key={s} onClick={() => setSearch(s)} style={{
                    background:C.card, border:`1px solid ${C.border}`, borderRadius:5,
                    padding:"5px 9px", color:C.text, fontSize:"0.68rem",
                    fontFamily:"'Source Sans 3',sans-serif",
                  }}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {dbStatus === "ready" && results.length > 0 && (
            <div>
              <div style={{fontSize:"0.62rem", color:C.muted, marginBottom:6, textTransform:"uppercase", letterSpacing:1}}>
                {results.length} result{results.length !== 1 ? "s" : ""}
              </div>
              {results.map(d => (
                <DiscCard key={d.id} disc={d} onAdd={addToBag} onRemove={removeFromBag} inBag={bagIds.has(d.id)} />
              ))}
            </div>
          )}

          {dbStatus === "ready" && search.trim().length >= 2 && results.length === 0 && (
            <p style={{color:C.muted, textAlign:"center", padding:14, fontSize:"0.72rem"}}>
              No discs found for "{search}"
            </p>
          )}
        </div>
      )}

      {/* Bag view */}
      {view === "bag" && (
        <div>
          {bag.length === 0 ? (
            <div style={{textAlign:"center", padding:"30px 16px"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.3rem", letterSpacing:3, color:C.muted, marginBottom:8}}>
                Your bag is empty
              </div>
              <p style={{color:C.muted, fontSize:"0.72rem", lineHeight:1.6}}>
                Tap "Search Discs" to find and add discs. Your bag saves automatically in your browser.
              </p>
            </div>
          ) : (
            <div>
              {/* Legend */}
              <div style={{display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:12, padding:8, background:C.card, borderRadius:7}}>
                {[{c:C.os,l:"Overstable"},{c:C.stable,l:"Stable"},{c:C.us,l:"Understable"},{c:C.neutral,l:"Neutral"}].map(i => (
                  <div key={i.l} style={{display:"flex", alignItems:"center", gap:4, fontSize:"0.58rem", color:C.muted}}>
                    <div style={{width:8, height:8, borderRadius:"50%", background:i.c}}/>{i.l}
                  </div>
                ))}
              </div>

              {/* Grouped discs */}
              {catOrder.map(cat => {
                const discs = grouped[cat];
                if (!discs || discs.length === 0) return null;
                const sorted = [...discs].sort((a,b) => parseFloat(a.speed) - parseFloat(b.speed));
                return (
                  <div key={cat}>
                    <div style={{
                      fontFamily:"'Bebas Neue',sans-serif", fontSize:"1.05rem",
                      letterSpacing:3, color:catColors[cat],
                      margin:"14px 0 6px", paddingBottom:4,
                      borderBottom:`2px solid ${C.border}`,
                    }}>
                      {cat}
                    </div>
                    {sorted.map(d => (
                      <DiscCard key={d.id} disc={d} onAdd={addToBag} onRemove={removeFromBag} inBag={true} />
                    ))}
                  </div>
                );
              })}

              {/* Clear bag */}
              <button onClick={clearBag} style={{
                display:"block", margin:"18px auto 0", padding:"6px 16px",
                background:"transparent", border:`1px solid ${C.border}`,
                borderRadius:5, color:C.muted, fontSize:"0.6rem",
                fontWeight:600, letterSpacing:1, textTransform:"uppercase",
              }}>
                Clear Bag
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
